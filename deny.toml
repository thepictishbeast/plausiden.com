[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  # 0BSD is the simplest permissive license — used by quoted_printable
  # via lettre. No attribution requirement, public-domain-equivalent
  # in jurisdictions that recognize it.
  "0BSD",
  # CDLA-Permissive-2.0 covers webpki-roots (Mozilla CA bundle).
  # Permissive, attribution-required, OSI-style.
  "CDLA-Permissive-2.0",
  # PlausiDen-Loom is AGPL-3.0-or-later by design; we own it.
  "AGPL-3.0-or-later",
  # PlausiDen-Loom + plausiden-site themselves are UNLICENSED in
  # cargo's terms (private), surfaced as the literal "UNLICENSED"
  # spdx-ish string. We're the publisher; allow.
]
confidence-threshold = 0.9

[licenses.private]
# We're the publisher of plausiden-site (UNLICENSED) — skip license
# checks on our own private crates.
ignore = true

[bans]
multiple-versions = "warn"
# Path deps to PlausiDen-Loom resolve as wildcards in lock terms;
# allow-wildcards bypasses the check for sibling crates we own.
# Any third-party wildcard still fails.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
