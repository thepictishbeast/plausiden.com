name: audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - name: Clone PlausiDen-CMS (private path dep)
        env:
          GH_TOKEN: ${{ secrets.CMS_PAT }}
        run: |
          if [ -d ../PlausiDen-CMS/.git ]; then
            git -C ../PlausiDen-CMS remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git"
            git -C ../PlausiDen-CMS fetch --depth 1 origin
            git -C ../PlausiDen-CMS reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git" ../PlausiDen-CMS
          fi
      - name: Clone Mailroom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.MAILROOM_PAT }}
        run: |
          if [ -d ../Mailroom/.git ]; then
            git -C ../Mailroom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git"
            git -C ../Mailroom fetch --depth 1 origin
            git -C ../Mailroom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git" ../Mailroom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit (force latest; advisory-db ships CVSS 4.0)
        run: cargo install --locked --force cargo-audit
      - name: Audit
        # Deny actual unmaintained / advisory matches; warnings (e.g.,
        # informational notices on transitive deps we can't directly
        # update) don't block merges.
        run: cargo audit --deny unmaintained --deny unsound --deny yanked

  cargo-deny:
    name: cargo-deny (license + bans + sources)
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - name: Clone PlausiDen-CMS (private path dep)
        env:
          GH_TOKEN: ${{ secrets.CMS_PAT }}
        run: |
          if [ -d ../PlausiDen-CMS/.git ]; then
            git -C ../PlausiDen-CMS remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git"
            git -C ../PlausiDen-CMS fetch --depth 1 origin
            git -C ../PlausiDen-CMS reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git" ../PlausiDen-CMS
          fi
      - name: Clone Mailroom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.MAILROOM_PAT }}
        run: |
          if [ -d ../Mailroom/.git ]; then
            git -C ../Mailroom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git"
            git -C ../Mailroom fetch --depth 1 origin
            git -C ../Mailroom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git" ../Mailroom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny (idempotent)
        run: command -v cargo-deny || cargo install cargo-deny --locked
      - name: Check
        run: cargo deny check

  coupling:
    name: "Backend↔Frontend coupling audit"
    runs-on: [self-hosted, linux, x64, plausiden]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run static coupling check (vendored from PlausiDen-Audits)
        run: |
          # The script is vendored at .github/scripts/coupling-check.sh
          # because PlausiDen-Audits is private; see header comment in
          # that file for the upstream pointer + un-vendoring trigger.
          ./.github/scripts/coupling-check.sh "$GITHUB_WORKSPACE"

      - name: Verify COUPLING-EXEMPT annotations carry reasons
        run: |
          if grep -rnE 'COUPLING-EXEMPT(\b|$)(:[[:space:]]*$)?' "$GITHUB_WORKSPACE/src" 2>/dev/null \
              | grep -vE 'COUPLING-EXEMPT:[[:space:]]*\S+'; then
            echo "::error::COUPLING-EXEMPT annotation missing a reason"
            exit 1
          fi
          echo "All COUPLING-EXEMPT annotations carry reasons."

  version-control:
    name: "Version Control audit"
    runs-on: [self-hosted, linux, x64, plausiden]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Audit walks git log + ls-files; needs deeper history than
          # the default depth=1 shallow checkout.
          fetch-depth: 1000

      - name: Run version-control audit (vendored from PlausiDen-Audits)
        run: |
          ./.github/scripts/version-control-check.sh "$GITHUB_WORKSPACE" \
            | tee /tmp/version-control-report.txt
          # Surface FAIL lines as ::error:: so the Actions UI flags them
          # without having to dig into the log.
          grep '^FAIL' /tmp/version-control-report.txt 2>/dev/null \
            | while IFS= read -r line; do
                echo "::error::version-control: $line"
              done || true
          grep '^WARN' /tmp/version-control-report.txt 2>/dev/null \
            | while IFS= read -r line; do
                echo "::warning::version-control: $line"
              done || true
