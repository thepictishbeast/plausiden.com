name: audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # Deny actual unmaintained / advisory matches; warnings (e.g.,
        # informational notices on transitive deps we can't directly
        # update) don't block merges.
        run: cargo audit --deny unmaintained --deny unsound --deny yanked

  cargo-deny:
    name: cargo-deny (license + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check
        run: cargo deny check
