name: audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        # Deny actual unmaintained / advisory matches; warnings (e.g.,
        # informational notices on transitive deps we can't directly
        # update) don't block merges.
        run: cargo audit --deny unmaintained --deny unsound --deny yanked

  cargo-deny:
    name: cargo-deny (license + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check
        run: cargo deny check

  coupling:
    name: "Backend↔Frontend coupling audit"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch coupling check from PlausiDen-Audits
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/thepictishbeast/PlausiDen-Audits/main/audits/backend-frontend/check.sh" \
            -o /tmp/coupling-check.sh
          chmod +x /tmp/coupling-check.sh

      - name: Run static coupling check
        run: |
          /tmp/coupling-check.sh "$GITHUB_WORKSPACE"

      - name: Verify COUPLING-EXEMPT annotations carry reasons
        run: |
          if grep -rnE 'COUPLING-EXEMPT(\b|$)(:[[:space:]]*$)?' "$GITHUB_WORKSPACE/src" 2>/dev/null \
              | grep -vE 'COUPLING-EXEMPT:[[:space:]]*\S+'; then
            echo "::error::COUPLING-EXEMPT annotation missing a reason"
            exit 1
          fi
          echo "All COUPLING-EXEMPT annotations carry reasons."
