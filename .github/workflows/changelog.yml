name: changelog

# Auto-update CHANGELOG.md when a new release tag is pushed.
# Uses git-cliff to roll up the commits between the previous tag
# and the current one, grouped by Conventional Commits prefix
# (feat / fix / docs / perf / refactor / test / chore).
#
# The generated section is committed back to main via a PR — never
# directly pushed — so a human still glances over the rollup before
# it lands.
#
# Only runs on tag pushes matching `v*` to keep the workflow's blast
# radius tight (no main-branch silent edits).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    name: "Roll up commits since previous tag"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for cliff to walk tags

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Generate CHANGELOG.md
        run: |
          # If cliff.toml is absent, write a minimal one so the run
          # is reproducible from a clean checkout.
          if [[ ! -f cliff.toml ]]; then
            cat > cliff.toml <<'EOF'
          [changelog]
          header = "# Changelog\n\nAll notable changes to this project. Curated from Conventional Commits since the last tagged release.\n"
          body = """
          ## [{{ version }}] — {{ timestamp | date(format=\"%Y-%m-%d\") }}
          {% for group, commits in commits | group_by(attribute=\"group\") %}
          ### {{ group | upper_first }}
          {% for c in commits %}
            - {{ c.message | upper_first }}
          {% endfor %}{% endfor %}
          """
          footer = ""

          [git]
          conventional_commits = true
          commit_parsers = [
            { message = "^feat", group = "Features" },
            { message = "^fix", group = "Fixes" },
            { message = "^docs", group = "Docs" },
            { message = "^perf", group = "Performance" },
            { message = "^refactor", group = "Refactor" },
            { message = "^test", group = "Tests" },
            { message = "^chore", group = "Chore" },
            { message = "^ci", group = "CI" },
          ]
          filter_commits = false
          tag_pattern = "v[0-9]+\\\\.[0-9]+\\\\.[0-9]+"
          EOF
          fi
          git-cliff --output CHANGELOG.md

      - name: Open PR with the updated CHANGELOG
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs(changelog): update for ${{ github.ref_name }}"
          title: "Changelog rollup for ${{ github.ref_name }}"
          body: |
            Auto-generated by `git-cliff` on tag `${{ github.ref_name }}`.
            Review for accuracy + tone, then merge.
          branch: auto/changelog-${{ github.ref_name }}
          base: main
          add-paths: |
            CHANGELOG.md
            cliff.toml
