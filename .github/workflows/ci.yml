name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  audit:
    name: cargo-audit
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit (force latest; advisory-db ships CVSS 4.0)
        run: cargo install --locked --force cargo-audit
      - run: cargo audit --deny warnings

  deny:
    name: cargo-deny
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny (idempotent)
        run: command -v cargo-deny || cargo install --locked cargo-deny
      - run: cargo deny --all-features check

  build-musl:
    name: build (musl, static)
    # GitHub-hosted runner so apt-get + sudo work; the self-hosted runner
    # has `no_new_privs` set, which blocks the musl-tools install. Keep
    # this on ubuntu-latest so the static-build artifact step has a
    # writeable apt. Other jobs run on self-hosted to bypass GH-hosted
    # minute exhaustion.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: plausiden-site-musl
          path: target/x86_64-unknown-linux-musl/release/plausiden-site
          if-no-files-found: error
          retention-days: 14
