name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - name: Clone PlausiDen-CMS (private path dep)
        env:
          GH_TOKEN: ${{ secrets.CMS_PAT }}
        run: |
          if [ -d ../PlausiDen-CMS/.git ]; then
            git -C ../PlausiDen-CMS remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git"
            git -C ../PlausiDen-CMS fetch --depth 1 origin
            git -C ../PlausiDen-CMS reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git" ../PlausiDen-CMS
          fi
      - name: Clone Mailroom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.MAILROOM_PAT }}
        run: |
          if [ -d ../Mailroom/.git ]; then
            git -C ../Mailroom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git"
            git -C ../Mailroom fetch --depth 1 origin
            git -C ../Mailroom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git" ../Mailroom
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - name: Clone PlausiDen-CMS (private path dep)
        env:
          GH_TOKEN: ${{ secrets.CMS_PAT }}
        run: |
          if [ -d ../PlausiDen-CMS/.git ]; then
            git -C ../PlausiDen-CMS remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git"
            git -C ../PlausiDen-CMS fetch --depth 1 origin
            git -C ../PlausiDen-CMS reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git" ../PlausiDen-CMS
          fi
      - name: Clone Mailroom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.MAILROOM_PAT }}
        run: |
          if [ -d ../Mailroom/.git ]; then
            git -C ../Mailroom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git"
            git -C ../Mailroom fetch --depth 1 origin
            git -C ../Mailroom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git" ../Mailroom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  audit:
    name: cargo-audit
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - name: Clone PlausiDen-CMS (private path dep)
        env:
          GH_TOKEN: ${{ secrets.CMS_PAT }}
        run: |
          if [ -d ../PlausiDen-CMS/.git ]; then
            git -C ../PlausiDen-CMS remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git"
            git -C ../PlausiDen-CMS fetch --depth 1 origin
            git -C ../PlausiDen-CMS reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git" ../PlausiDen-CMS
          fi
      - name: Clone Mailroom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.MAILROOM_PAT }}
        run: |
          if [ -d ../Mailroom/.git ]; then
            git -C ../Mailroom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git"
            git -C ../Mailroom fetch --depth 1 origin
            git -C ../Mailroom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git" ../Mailroom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit (force latest; advisory-db ships CVSS 4.0)
        run: cargo install --locked --force cargo-audit
      - run: cargo audit --deny warnings

  deny:
    name: cargo-deny
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - name: Clone PlausiDen-Loom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.LOOM_PAT }}
        run: |
          if [ -d ../PlausiDen-Loom/.git ]; then
            git -C ../PlausiDen-Loom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git"
            git -C ../PlausiDen-Loom fetch --depth 1 origin
            git -C ../PlausiDen-Loom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-Loom.git" ../PlausiDen-Loom
          fi
      - name: Clone PlausiDen-CMS (private path dep)
        env:
          GH_TOKEN: ${{ secrets.CMS_PAT }}
        run: |
          if [ -d ../PlausiDen-CMS/.git ]; then
            git -C ../PlausiDen-CMS remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git"
            git -C ../PlausiDen-CMS fetch --depth 1 origin
            git -C ../PlausiDen-CMS reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/PlausiDen-CMS.git" ../PlausiDen-CMS
          fi
      - name: Clone Mailroom (private path dep)
        env:
          GH_TOKEN: ${{ secrets.MAILROOM_PAT }}
        run: |
          if [ -d ../Mailroom/.git ]; then
            git -C ../Mailroom remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git"
            git -C ../Mailroom fetch --depth 1 origin
            git -C ../Mailroom reset --hard FETCH_HEAD
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/thepictishbeast/Mailroom.git" ../Mailroom
          fi
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny (idempotent)
        run: command -v cargo-deny || cargo install --locked cargo-deny
      - run: cargo deny --all-features check

# build-musl moved to release.yml — runs on tag push + workflow_dispatch.
# Rationale: the deployed binary on web-01 is dynamically-linked glibc, not the
# static musl artifact, so building musl on every commit produces an unused
# artifact. The GH-hosted runner needed for `apt-get install musl-tools` was
# also unreliable for a stretch (assignment failures with empty runner_name).
# Keep the capability for tag releases or manual dispatch when actually needed.
