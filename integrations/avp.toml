# plausiden-site ↔ PlausiDen-AVP-Doctrine integration.
#
# Declares which AVP tiers this repo targets and current pass state.
# Regenerated section can be auto-generated by the AVP engine once built;
# today this is hand-maintained.

[meta]
repo                = "plausiden-site"
doctrine_version    = "1.0"
engine_version      = "0.1.0-pre"
entered_namespace   = "2026-04-24"
classification      = "product / marketing website"

[tiers]
tier_1_correctness          = "passing"
tier_2_fuzz                 = "not_started"    # no user-submitted payloads on the wire in v1
tier_3_adversarial          = "not_started"
tier_4_cross_platform       = "n/a"            # single-target Linux musl binary
tier_5_visual_drift         = "not_started"    # visual regression deferred to v1.1
tier_6_formal               = "not_started"
doctrine_conformance        = "passing"
generality                  = "n/a"            # site content is project-specific
harvest_readiness           = "n/a"            # marketing copy has no upstream candidates

[graduation]
next_gate = "production-cutover-replacing-react-spa"
note      = """
Scaffold is live. Gate to production is: POST /contact wired with lettre +
governor, client-side age encryption of inquiry payloads, systemd hardened
unit in place, staging review by the human maintainer. Only then does
next.plausiden.com become www.plausiden.com.
"""

[pre_commit]
# Local pre-commit audits run on 2026-04-24. Green across all four.
verify-code = "green"
test        = "green"
data-leak   = "green"
debug-logs  = "green"
last_run    = "2026-04-24"
findings    = "none"

[notes]
observability   = "Uses `tracing` inline per PlausiDen-Obs doctrine. Will migrate to the `plausiden-obs` crate once it has real content (today it's Tier 0 scaffold)."
canon           = "Not applicable in v1 — site has no shared UI primitives. If Canon adds a web target useful to a marketing-scale site, reassess."
forbidden_unsafe = "Crate is `#![forbid(unsafe_code)]` at the root."
